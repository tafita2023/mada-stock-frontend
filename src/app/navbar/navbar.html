<!-- header.html -->
<nav class="custom-nav">
    <div class="nav-container">
      <div class="nav-wrapper">
        
        <!-- Logo Section -->
        <div class="logo-section">
          <a href="/" class="logo-link">
            <div class="logo-wrapper">
              <img class="logo-image" src="/logo.jpg" alt="Logo">
            </div>
          </a>
        </div>
  
        <!-- Desktop Menu -->
        <div class="desktop-menu">
          <a href="/" class="nav-link">
            <span>Accueil</span>
            <span class="nav-link-bg"></span>
          </a>

          <!-- MENU PRODUIT -->
          <div class="nav-dropdown"
            (mouseenter)="isProductSubmenuOpen = true"
            (mouseleave)="isProductSubmenuOpen = false"
          >

            <!-- Bouton principal -->
            <a [routerLink]="['/produits']" class="nav-link dropdown-toggle">
              <span>E-liquides</span>

              <svg class="w-6 h-6 dropdown-icon"
                [class.open]="isProductSubmenuOpen"
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                fill="none"
                viewBox="0 0 24 24">
                <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="m5 15 7-7 7 7"/>
              </svg>

              <span class="nav-link-bg"></span>
            </a>

            <!-- Dropdown -->
            <div class="dropdown-menu">

              <a class="dropdown-item" (click)="goToProduits()">
                Tout
              </a>
            
              <a
                *ngFor="let saveur of saveurs"
                class="dropdown-item"
                (click)="filtrerParSaveur(saveur)">
                {{ saveur }}
              </a>
            
            </div>
          </div>

          <!-- MENU MATERIEL -->
          <div class="nav-dropdown"
            (mouseenter)="isMaterielSubmenuOpen = true"
            (mouseleave)="isMaterielSubmenuOpen = false" 
          >
            <!-- Bouton principal -->
            <a [routerLink]="['/materiels']" class="nav-link dropdown-toggle">
              <span>E-cigarette</span>

              <svg class="w-6 h-6 dropdown-icon"
                [class.open]="isMaterielSubmenuOpen"
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                fill="none"
                viewBox="0 0 24 24">
                <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="m5 15 7-7 7 7"/>
              </svg>

              <span class="nav-link-bg"></span>
            </a>

            <!-- Dropdown -->
            <div class="dropdown-menu">

              <a class="dropdown-item" (click)="goToMateriels()">
                Tout
              </a>
            
              <a
                *ngFor="let type of types"
                class="dropdown-item"
                (click)="filtrerParType(type)">
                {{ type }}
              </a>
            
            </div>
          </div>

          <a href="/contact" class="nav-link">
            <span>Contact</span>
            <span class="nav-link-bg"></span>
          </a>
        </div>
  
        <!-- Right Section -->
        <div class="right-section">
          <!-- Cart Button -->
          <button class="cart-button" [routerLink]="['/panier']">
            <svg class="cart-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10V6a3 3 0 0 1 3-3v0a3 3 0 0 1 3 3v4m3-2 .917 11.923A1 1 0 0 1 17.92 21H6.08a1 1 0 0 1-.997-1.077L6 8h12Z"></path>
            </svg>
            <span class="cart-badge">{{ cartCount }}</span>
          </button>
          
          <!-- Mobile Menu Button -->
          <button (click)="toggleMobileMenu()" class="mobile-menu-button">
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
          </button>
        </div>
      </div>
  
      <!-- Mobile Menu -->
      <div *ngIf="isMobileMenuOpen" class="mobile-menu">
          <div class="mobile-menu-content">
              
              <a href="/" class="mobile-nav-link" (click)="closeMobileMenu()">
                  <span>Accueil</span>
              </a>
              
              <!-- MENU E-LIQUIDES -->
              <div class="mobile-dropdown">
                  <div class="mobile-nav-link dropdown-toggle" (click)="toggleProductSubmenu()">
                      <span>E-liquides</span>
                      <svg class="dropdown-icon" [class.open]="isProductSubmenuOpen" viewBox="0 0 24 24">
                          <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m5 15 7-7 7 7"/>
                      </svg>
                  </div>
                  
                  <div class="mobile-submenu" [class.open]="isProductSubmenuOpen">

                    <a
                      class="mobile-subitem"
                      (click)="goToProduits()">
                      Tout
                    </a>
                  
                    <a
                      *ngFor="let saveur of saveurs"
                      class="mobile-subitem"
                      (click)="filtrerParSaveur(saveur)">
                      {{ saveur }}
                    </a>
                  
                  </div>
                </div>

              <!-- MENU E-CIGARETTES -->
              <div class="mobile-dropdown">
                  <div class="mobile-nav-link dropdown-toggle" (click)="toggleMaterielSubmenu()">
                      <span>E-cigarettes</span>
                      <svg class="dropdown-icon" [class.open]="isMaterielSubmenuOpen" viewBox="0 0 24 24">
                          <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m5 15 7-7 7 7"/>
                      </svg>
                  </div>
                  
                  <div class="mobile-submenu" [class.open]="isMaterielSubmenuOpen">

                    <a
                      class="mobile-subitem"
                      (click)="goToMateriels()">
                      Tout
                    </a>
                  
                    <a
                      *ngFor="let type of types"
                      class="mobile-subitem"
                      (click)="filtrerParType(type)">
                      {{ type }}
                    </a>
                  
                  </div>
              </div>
              
              <a href="/contact" class="mobile-nav-link" (click)="closeMobileMenu()">
                  <span>Contact</span>
              </a>
              
          </div>
      </div>      
    </div>
  </nav>
