<div class="about-container">

      <div class="about-image">
        <img 
          src="/cover.jpg" 
          alt="About Us"
          class="about-img"
        >
      </div>
  
      <!-- Section Texte -->
      <div class="about-content">  
        <div class="about-body">
          <p class="about-description">
            {{ aboutData.description }}
          </p>
        </div>
      </div>
    </div>

    <!-- Image centrale -->
    <div class="about-center-image">
      <img src="/info.jpg" alt="information" />
    </div>
