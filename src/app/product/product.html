<section class="products-section">
    <div class="products-container">
        <!-- En-tête -->
        <div class="products-header">
            <h2 class="products-title">
                Nos E-liquides
            </h2>
        </div>

        <!-- Grille de produits -->
        <div class="products-grid">
            <div class="product-card" *ngFor="let product of products">
                
                <!-- Image du produit -->
                <div class="product-image">
                    <img [src]="getImageUrl(product.image)" [alt]="product.nom">
                    
                    <div class="stock-badge" [class.out-of-stock]="!product.stock">
                        {{ product.stock ? 'En stock' : 'Rupture' }}
                    </div>
                </div>

                <!-- Informations produit -->
                <div class="product-info">
                    <h3 class="product-name">{{ product.nom }}</h3>
                    <h1 class="product-description">{{ product.description }}</h1>
                    <!-- Prix -->
                    <div class="product-price">
                        <span class="current-price">Prix: {{ product.prix | number }} Ar</span>
                    </div>

                    <!-- Bouton ajouter -->
                    <button class="add-to-cart-btn" (click)="addToCart(product)" [disabled]="!product.stock">
                        {{ product.stock ? 'Ajouter au panier' : 'Indisponible' }}
                    </button>
                </div>
            </div>
        </div>
    </div>
</section>
